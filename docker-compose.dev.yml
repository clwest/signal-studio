# SignalStudio — dev overlay

services:
  signal_studio_api:
    command: >
      sh -c "python -c 'from app.seed import seed_database; seed_database()' &&
             uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload --reload-dir /app"
    volumes:
      - ./backend:/app
    environment:
      PYTHONDONTWRITEBYTECODE: "1"

  signal_studio_web:
    image: node:20-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - signal_studio_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}

volumes:
  signal_studio_node_modules:
    name: signal_studio_node_modules
